<head>
    <title>Tabel Latihan</title>
    <style>
        table {
            border-collapse: collapse;
            margin: auto;
        }
        td {
            border: 1px solid black;
            width: 70px;
            height: 70px;
            text-align: center;
            vertical-align: middle;
            font-size: 18px;
        }
        .center {
            font-size: 30px;
            font-weight: bold;
        }

        /* Tambahan untuk biodata */
        .biodata td {
            width: auto;
            height: auto;
            padding: 8px;
            text-align: left;
        }
    </style>
</head>
<body>

<h2 style="text-align:center;">Latihan</h2>

<!-- TABEL LATIHAN -->
<table>
    <tr>
        <td>1,1</td>
        <td>1,2</td>
        <td>1,3</td>
        <td>1,4</td>
    </tr>

    <tr>
        <td>2,1</td>
        <td class="center" colspan="2" rowspan="2">?</td>
        <td>2,4</td>
    </tr>

    <tr>
        <td>3,1</td>
        <td>3,4</td>
    </tr>

    <tr>
        <td>4,1</td>
        <td>4,2</td>
        <td>4,3</td>
        <td>4,4</td>
    </tr>
</table>

<br><br>

<!-- BIODATA JADI TABEL -->
<h3 style="text-align:center;">BIODATA</h3>

<table class="biodata">
    <tr>
        <td><b>Nama</b></td>
        <td>Panji Satria Pratama</td>
    </tr>
    <tr>
        <td><b>NIM</b></td>
        <td>13242520066</td>
    </tr>
    <tr>
        <td><b>Tentang Saya</b></td>
        <td>Saya adalah seorang yang pengen tahu dengan hal apapun</td>
    </tr>
</table>

</body>
</html>
